
<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Endless Runner</title>
<style>
body{margin:0;background:#111;overflow:hidden;font-family:Arial}#ui{position:absolute;top:10px;left:10px;color:#fff}
canvas{display:block}
</style></head><body><div id="ui">Score: <span id=s>0</span><br>← → move, Space jump</div>
<canvas id=c></canvas>
<script>
const cv=c,ctx=cv.getContext('2d');function rs(){cv.width=innerWidth;cv.height=innerHeight}onresize=rs;rs();
let lane=1,y=0,vy=0,g=-0.8,score=0,obs=[];
function spawn(){obs.push({z:800,l:Math.floor(Math.random()*3)})}
setInterval(spawn,900);
onkeydown=e=>{if(e.key=="ArrowLeft"&&lane>0)lane--;if(e.key=="ArrowRight"&&lane<2)lane++;if(e.code=="Space"&&y==0)vy=14;}
function loop(){
ctx.fillStyle="#87ceeb";ctx.fillRect(0,0,cv.width,cv.height);
ctx.fillStyle="#555";ctx.fillRect(cv.width/2-180,0,360,cv.height);
for(let i=0;i<20;i++){ctx.fillStyle=i%2?"#777":"#999";ctx.fillRect(cv.width/2-5, i*60+(score%60),10,40)}
y+=vy;vy+=g;if(y<0){y=0;vy=0;}
let px=cv.width/2-120+lane*120;
ctx.fillStyle="red";ctx.fillRect(px-20,cv.height-80-y,40,40);
for(let i=obs.length-1;i>=0;i--){
 let o=obs[i];o.z-=8;
 let sy=cv.height-o.z/2;
 let ox=cv.width/2-120+o.l*120-20;
 ctx.fillStyle="black";ctx.fillRect(ox,sy,40,40);
 if(Math.abs(sy-(cv.height-80-y))<35 && o.l==lane){alert("Game Over! Score "+score);location.reload();}
 if(o.z<0)obs.splice(i,1);
}
score++;s.textContent=score;
requestAnimationFrame(loop)}
loop();
</script></body></html>
